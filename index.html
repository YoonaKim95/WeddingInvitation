<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 결혼합니다 💍</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="hero">
    <h1>김윤아 💗 김병진</h1>
    <p class="date">2025년 10월 25일 토요일 오후 1시</p>
    <p class="venue">서울 웨딩홀</p>
  </header>

  <section class="invitation">
    <h2>초대의 말씀</h2>
    <p>저희 두 사람이 새로운 시작을 함께하려 합니다.<br>축복해주시면 더없는 기쁨이겠습니다.</p>
  </section>

  <section class="gallery">
    <h2>우리의 이야기</h2>
    <div class="images">
      <img src="photo1.jpg" alt="우리의 사진">
      <img src="photo2.jpg" alt="우리의 사진">
    </div>
  </section>

  <section class="rsvp">
    <h2>참석 여부</h2>
    <form>
      <input type="text" placeholder="이름">
      <input type="text" placeholder="전화번호">
      <select>
        <option>참석</option>
        <option>불참</option>
      </select>
      <button type="submit">전송</button>
    </form>
  </section>

  <footer>
    <p>김윤아 & 안병진의 결혼식에 초대합니다.</p>
  </footer>
</body>
</html>
